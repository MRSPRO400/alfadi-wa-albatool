<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الأدمن</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
}

/* خلفية ذهبية خفيفة */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:gold;
    filter:blur(120px);
    opacity:0.15;
    top:-100px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:gold;
    filter:blur(140px);
    opacity:0.1;
    bottom:-120px;
    right:-120px;
}

.login-box{
    width:380px;
    padding:35px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 15px 50px rgba(0,0,0,0.7);
    text-align:center;
    z-index:2;
}

.login-box h2{
    color:gold;
    margin-bottom:10px;
    font-size:24px;
}

.login-box p{
    color:#bbb;
    font-size:13px;
    margin-bottom:25px;
}

.input-box{
    margin:12px 0;
}

input{
    width:100%;
    padding:13px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    background:rgba(255,255,255,0.12);
    border:1px solid gold;
}

button{
    width:100%;
    padding:13px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg, gold, #d4af37);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    font-size:15px;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(255,215,0,0.25);
}

/* صغير للموبايل */
@media(max-width:420px){
    .login-box{
        width:90%;
    }
}
</style>

</head>

<body>

<div class="login-box">

    <h2>🔐 لوحة تحكم الأدمن</h2>
    <p>تسجيل الدخول لإدارة المنتجات والسعر</p>

    <form method="POST">

        <div class="input-box">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="كلمة المرور" required>
        </div>

        <button type="submit">دخول</button>

    </form>

</div>

</body>
</html>
