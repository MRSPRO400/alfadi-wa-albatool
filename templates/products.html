<!DOCTYPE html>
<html dir="rtl">

<head>
<meta charset="UTF-8">
<title>المنتجات</title>

<style>
  :root{
    --gold:#D4AF37;
    --gold-soft:#f6e7b0;
    --bg:#070707;
    --card:rgba(20,20,20,0.65);
    --text:#ffffff;
    --muted:#b8b8b8;
}

/* =========================
   GLOBAL
========================= */
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at 15% 20%, rgba(212,175,55,0.12), transparent 45%),
        radial-gradient(circle at 85% 30%, rgba(255,255,255,0.04), transparent 40%),
        linear-gradient(135deg,#050505,#0c0c0c,#070707);
    overflow-x:hidden;
}

/* soft luxury overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(to bottom, rgba(0,0,0,0.6), transparent 40%, rgba(0,0,0,0.7));
    pointer-events:none;
}

/* =========================
   TITLE (MAKES PAGE LOOK LIKE BRAND)
========================= */
h1{
    text-align:center;
    margin:50px 0 10px;
    font-size:34px;
    color:var(--gold);
    letter-spacing:2px;
}

h1::after{
    content:"";
    display:block;
    width:120px;
    height:2px;
    margin:12px auto 0;
    background:linear-gradient(to right, transparent, var(--gold), transparent);
    opacity:0.7;
}

/* =========================
   FILTER BAR (PREMIUM LAYOUT)
========================= */
.filters{
    position:sticky;
    top:10px;
    z-index:10;

    display:flex;
    justify-content:center;
    gap:10px;

    margin:20px auto 50px;
    padding:12px;

    max-width:850px;

    background:rgba(20,20,20,0.45);
    backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.06);
    border-radius:999px;

    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* button becomes "segment" not button */
.filter-btn{
    border:none;
    background:transparent;
    color:var(--muted);
    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;
    font-size:13px;
    transition:0.4s;
    position:relative;
}

/* hover underline glow */
.filter-btn::after{
    content:"";
    position:absolute;
    bottom:-6px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:2px;
    background:var(--gold);
    transition:0.4s;
}

.filter-btn:hover{
    color:white;
}

.filter-btn:hover::after{
    width:60%;
}

/* active = luxury pill highlight */
.filter-btn.active{
    color:black;
    background:linear-gradient(135deg,var(--gold),var(--gold-soft));
    box-shadow:0 0 25px rgba(212,175,55,0.25);
}

/* active removes underline effect */
.filter-btn.active::after{
    display:none;
}

/* =========================
   GRID
========================= */
.grid{
    display:flex;
    flex-direction:column;
    gap:35px;
    max-width:980px;
    margin:auto;
    padding:10px 20px 60px;
}

/* =========================
   CARD (SLIGHTLY MORE EDITORIAL STYLE)
========================= */
.card{
    background:var(--card);
    border-radius:26px;
    overflow:hidden;
    position:relative;
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.06);
    transition:0.5s ease;
}

/* top luxury glow line */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:0.5;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* =========================
   IMAGE
========================= */
.card img{
    width:100%;
    height:460px;
    object-fit:contain;
    padding:25px;
    background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 60%),
        #0a0a0a;
}

/* =========================
   BODY
========================= */
.card-body{
    padding:22px;
    text-align:right;
}

.card h3{
    color:var(--gold);
    font-size:21px;
    margin-bottom:8px;
}

.card p{
    color:var(--muted);
    font-size:14px;
    line-height:1.7;
}

/* =========================
   BADGE (INCLUDING NEW PRODUCT STYLE)
========================= */
.badge{
    position:absolute;
    top:15px;
    left:15px;
    padding:6px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:bold;

    background:rgba(212,175,55,0.9);
    color:black;
}

/* NEW PRODUCTS OPTION (لو هتضيفي class="new") */
.card.new .badge{
    background:linear-gradient(135deg,#ffcc70,#ff8c42);
    box-shadow:0 0 20px rgba(255,140,66,0.3);
}

/* =========================
   FAVORITE
========================= */
.fav-btn{
    position:absolute;
    top:15px;
    right:15px;
    border:none;
    background:rgba(0,0,0,0.35);
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
    backdrop-filter: blur(10px);
    transition:0.4s;
}

.fav-btn:hover{
    transform:scale(1.15);
    color:var(--gold);
}

/* =========================
   COUNTER
========================= */
.fav-count{
    position:absolute;
    bottom:15px;
    left:15px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(212,175,55,0.3);
    color:var(--gold);
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){
    .filters{
        flex-wrap:wrap;
        border-radius:20px;
        padding:10px;
    }

    .card img{
        height:320px;
    }

    h1{
        font-size:24px;
    }
}
.active-fav{
    background:red !important;
    color:white !important;
}

</style>

</head>

<body>

<h1>منتجات الفادي والبتول</h1>

<!-- ====== الفلاتر ====== -->
<div class="filters">
    <button class="filter-btn active" onclick="filterProducts('all', this)">كل المجموعات</button>
    <button class="filter-btn" onclick="filterProducts('rings', this)">خواتم</button>
    <button class="filter-btn" onclick="filterProducts('bracelets', this)">أساور</button>
    <button class="filter-btn" onclick="filterProducts('circle', this)">حلقان</button>
    <button class="filter-btn" onclick="filterProducts('neclaces', this)">سلاسل</button>
    <button class="filter-btn" onclick="filterProducts('assests', this)">أطقم</button>
</div>

<!-- ====== المنتجات ====== -->
<div class="grid">

{% for product in products %}

<div class="card" data-category="{{ product.category }}">

    <span class="badge">
        {{ product.category }}
    </span>
    
    <button class="fav-btn" onclick="toggleFav({{ product.id }})">
        ❤️
    </button>

    <span id="count-{{ product.id }}" class="fav-count">0 ❤️</span>

    <img src="/{{ product.image }}">

    <div class="card-body">

        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>

    </div>

</div>

{% endfor %}

</div>

<!-- ====== JS ====== -->
<script src="/js/products.js">
    function toggleFav(id){

    fetch("/favorite/" + id,{
        method:"POST"
    })
    .then(res => res.json())
    .then(data => {

        const btn = document.querySelector(
            `[onclick="toggleFav(${id})"]`
        );

        if(data.status === "added"){
            btn.classList.add("active-fav");
        }else{
            btn.classList.remove("active-fav");
        }

        loadCount(id);

    });

}
</script>

<script>

/* ====== فلترة المنتجات ====== */
function filterProducts(category, btn){

    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {

        if(category === "all"){
            card.style.display = "block";
        }else{
            card.style.display = (card.dataset.category === category)
                ? "block"
                : "none";
        }

    });

    // تفعيل الزر الذهبي
    document.querySelectorAll(".filter-btn")
    .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}

</script>

</body>
</html>
